<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Segurito Futurista</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background: #000;
      color: #e0e0e0;
      margin: 0;
      padding: 40px;
      text-align: center;
      overflow-x: hidden;
    }

    canvas#fondo {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
    }

    h1 {
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc;
      margin-bottom: 20px;
    }

    #intro { margin-top: 100px; }
    #intro img { width: 300px; animation: pulso 2s infinite; }

    #intro button {
      margin-top: 30px;
      background: rgba(0, 31, 63, 0.4);
      color: #00ffcc;
      border: 2px solid #00ffcc;
      border-radius: 12px;
      padding: 15px 25px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 15px #00ffcc;
    }
    #intro button:hover { background-color: #003366; color: #fff; box-shadow: 0 0 25px #00ccff; }

    #app { display: none; }

    h2 {
      color: #00aaff;
      font-size: 28px;
      text-shadow: 0 0 10px #00aaff;
      animation: brillo 2s infinite;
      margin-top: 40px;
    }

    .contenedor {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .boton {
      background: rgba(0, 31, 63, 0.4);
      color: #00aaff;
      border: 2px solid #00aaff;
      border-radius: 12px;
      padding: 15px 25px;
      font-size: 16px;
      cursor: pointer;
      width: 220px;
      transition: 0.3s;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 15px #00aaff;
    }
    .boton:hover { background-color: #003366; color: #fff; box-shadow: 0 0 25px #00ccff; }

    #resultado { margin-top: 30px; font-size: 18px; color: #00ccff; text-shadow: 0 0 8px #00ccff; }

    #panel {
      margin-top: 40px;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 15px #00ffcc;
    }
  </style>
</head>
<body>
  <canvas id="fondo"></canvas>

  <!-- Pantalla inicial -->
  <div id="intro">
    <h1>🔒 Segurito Futurista</h1>
    <img src="radar_futurista.png" alt="Radar futurista">
    <br>
    <button onclick="iniciarApp()">Iniciar</button>
  </div>

  <!-- Aplicación -->
  <div id="app">
    <h1>🚨 Seguridad Vecinal Futurista 🚨</h1>
    <p>Funciones principales:</p>

    <div class="contenedor">
      <button class="boton" onclick="botonSOS()">🚨 Botón SOS</button>
      <button class="boton" onclick="ubicacionGPS()">📍 Ubicación GPS</button>
      <button class="boton" onclick="alertaVecinos()">📢 Alerta Vecinal</button>
      <button class="boton" onclick="contactarAutoridades()">📞 Contactar Autoridades</button>
      <button class="boton" onclick="mapaZonaSegura()">🗺️ Ruta a Policía</button>
    </div>

    <div id="resultado"></div>

    <h2>Panel de estadísticas</h2>
    <div id="panel">
      <p>SOS activado: <span id="statSOS">0</span> veces</p>
      <p>Ubicación GPS usada: <span id="statGPS">0</span> veces</p>
      <p>Alertas vecinales: <span id="statAlertas">0</span> veces</p>
    </div>

    <!-- Sonidos -->
    <audio id="radar" src="https://actions.google.com/sounds/v1/science_fiction/sci_fi_radar.ogg" loop></audio>
    <audio id="alarma" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>
  </div>

  <script>
    // Fondo animado con partículas
    const canvas = document.getElementById("fondo");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let estrellas = [];
    for (let i=0; i<100; i++) estrellas.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2});
    function animar() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = "#00ffcc";
      estrellas.forEach(e => {
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
        e.y += 0.2; if (e.y > canvas.height) e.y = 0;
      });
      requestAnimationFrame(animar);
    }
    animar();

    // Estadísticas
    let statSOS=0, statGPS=0, statAlertas=0;

    function iniciarApp() {
      document.getElementById("intro").style.display = "none";
      document.getElementById("app").style.display = "block";
      const radar = document.getElementById("radar");
      radar.play().catch(() => window.addEventListener('click', () => radar.play()));
    }

    function botonSOS() {
      statSOS++; document.getElementById("statSOS").innerText = statSOS;
      const alarma = document.getElementById("alarma"); alarma.play();
      document.getElementById("resultado").innerHTML = "🚨 Alarma activada. Vecinos y autoridades notificados.";
    }

    function ubicacionGPS() {
      statGPS++; document.getElementById("statGPS").innerText = statGPS;
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
          const lat = pos.coords.latitude, lon = pos.coords.longitude;
          window.open(`https://www.google.com/maps?q=${lat},${lon}`, "_blank");
          document.getElementById("resultado").innerHTML = `📍 Abriendo tu ubicación en Google Maps (${lat.toFixed(3)}, ${lon.toFixed(3)})`;
        });
      } else document.getElementById("resultado").innerHTML = "❌ GPS no disponible en este dispositivo.";
    }

    function alertaVecinos() {
      statAlertas++; document.getElementById("statAlertas").innerText = statAlertas;
      const puntos = [{lat: 19.292, lon: -99.655},{lat: 19.293, lon: -99.657},{lat: 19.294, lon: -99.653}];
      let url = "https://www.google.com/maps/dir/";
      puntos.forEach(p => url += `${p.lat},${p.lon}/`);
      window.open(url, "_blank");
      document.getElementById("resultado").innerHTML = "📢 Mostrando puntos cercanos en Google Maps para alerta vecinal.";
    }

    function contactarAutoridades() {
      window.location.href = "tel:911";
      document.getElementById("resultado").innerHTML = "📞 Llamando a servicios de emergencia...";
    }

        function mapaZonaSegura() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const destino = "Estación de Policía Toluca";
          window.open(`https://www.google.com/maps/dir/${lat},${lon}/${destino}`, "_blank");
          document.getElementById("resultado").innerHTML =
            "🗺️ Mostrando ruta hacia la estación de policía más cercana.";
        });
      } else {
        document.getElementById("resultado").innerHTML =
          "❌ GPS no disponible en este dispositivo.";
      }
    }
  </script>
</body>
</html>
